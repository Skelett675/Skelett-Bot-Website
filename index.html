<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Skelett Bot</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<!-- SETTINGS BUTTON -->
<div class="settings">
  <button onclick="toggleSettings()">⚙</button>

  <div id="settingsMenu" class="settings-menu hidden">
    
    <h3>Settings</h3>

    <label>Language</label>
    <select onchange="setLanguage(this.value)">
      <option value="de">Deutsch</option>
      <option value="en">English</option>
    </select>

    <label>Theme Color</label>
    <select onchange="setTheme(this.value)">
      <option value="green">Green</option>
      <option value="gray">Gray</option>
      <option value="pastel">Pastel</option>
    </select>

  </div>
</div>

<div class="container">

  <div class="card">

    <h1 id="title">🤖 Skelett Bot</h1>
    <p id="subtitle">Control Panel</p>

    <button onclick="goDashboard()" id="btnDash">Dashboard</button>
    <button onclick="goTerms()" id="btnTerms">Terms</button>
    <button onclick="goPrivacy()" id="btnPrivacy">Privacy</button>

    <div class="small">Glass UI • v1</div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
