<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Start</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1e1f22, #111214);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* GLASS CARD */
.card {
  width: 500px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(88, 242, 163, 0.2);
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  color: #58f2a3;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #5865F2;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1>📜 Willkommen</h1>

  <p>Bitte akzeptiere die Richtlinien.</p>

  <button onclick="location.href='dashboard.html'">Dashboard</button>
  <button onclick="location.href='privacy.html'">Privacy</button>
</div>

</body>
</html>
