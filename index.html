<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Skelett Bot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow"></div>

<button class="settings-btn" onclick="toggleSettings()">⚙</button>

<div class="settings" id="settings">
  <label data-i18n="language">Sprache</label>
  <select onchange="setLang(this.value)">
    <option value="de">Deutsch</option>
    <option value="en">English</option>
  </select>

  <label data-i18n="color">Farbe</label>
  <select onchange="setTheme(this.value)">
    <option value="green">Grün</option>
    <option value="blue">Blau</option>
    <option value="red">Rot</option>
    <option value="purple">Lila</option>
    <option value="orange">Orange</option>
    <option value="gray">Grau</option>
  </select>
</div>

<div class="center">
  <div class="card">
    <h1 id="title">🤖 Skelett Bot</h1>
    <p id="subtitle">Control Panel</p>

    <button data-i18n="terms" onclick="location.href='terms.html'">Terms</button>
    <button data-i18n="privacy" onclick="location.href='privacy.html'">Privacy</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
