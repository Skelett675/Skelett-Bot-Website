<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bot Dashboard</title>

<style>
body {
  background:#1e1f22;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card {
  background:#2b2d31;
  margin:20px auto;
  padding:20px;
  width:300px;
  border-radius:12px;
}

.green {
  color:#3ba55c;
}

.red {
  color:#ed4245;
}
</style>
</head>

<body>

<h1>🤖 Bot Dashboard</h1>

<div class="card">
  <h2>Bot Status</h2>
  <p id="status">Lade...</p>
</div>

<div class="card">
  <h2>AutoMod</h2>
  <p id="automod">Lade...</p>
</div>

<script>

async function loadData(){
  try {
    const res = await fetch("http://localhost:3000/api/status");
    const data = await res.json();

    // BOT STATUS
    document.getElementById("status").innerHTML =
      data.online ? "<span class='green'>🟢 ONLINE</span>" : "<span class='red'>🔴 OFFLINE</span>";

    // AUTOMOD STATUS
    document.getElementById("automod").innerHTML =
      data.autoMod ? "<span class='green'>🟢 AN</span>" : "<span class='red'>🔴 AUS</span>";

  } catch (e) {
    document.getElementById("status").innerHTML = "❌ API nicht erreichbar";
    document.getElementById("automod").innerHTML = "❌ API nicht erreichbar";
  }
}

loadData();
setInterval(loadData, 3000); // live update

</script>

</body>
</html>
