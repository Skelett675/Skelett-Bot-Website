<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skelett Bot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow"></div>

<button class="settings-btn" onclick="toggleSettings()">⚙</button>

<div class="settings" id="settings">
  <label>Language</label>
  <select onchange="setLang(this.value)">
    <option value="de">Deutsch</option>
    <option value="en" selected>English</option>
  </select>

  <label>Color</label>
  <select onchange="setTheme(this.value)">
    <option value="green">Green</option>
    <option value="blue">Blue</option>
    <option value="red">Red</option>
    <option value="purple">Purple</option>
    <option value="orange">Orange</option>
    <option value="gray">Gray</option>
  </select>
</div>

<div class="center">
  <div class="card">
    <h1 id="title">🤖 Skelett Bot</h1>
    <p id="subtitle">Control Panel</p>

    <button data-i18n="terms" onclick="location.href='terms.html'">Terms</button>
    <button data-i18n="privacy" onclick="location.href='privacy.html'">Privacy</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
