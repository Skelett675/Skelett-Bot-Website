<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Start</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1e1f22, #111214);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 500px;
  padding: 35px;
  border-radius: 25px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(88, 242, 163, 0.25);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);

  transform: perspective(1000px) rotateX(2deg);
  transition: 0.25s;
  text-align: center;
}

.card:hover {
  transform: perspective(1000px) rotateX(0deg) scale(1.01);
}

h1 {
  color: #58f2a3;
}

button {
  margin-top: 12px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #5865F2;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1>🤖 Skelett Bot Dashboard</h1>

  <p>Willkommen 👋</p>

  <button onclick="location.href='dashboard.html'">Dashboard starten</button>
  <button onclick="location.href='privacy.html'">Privacy</button>
  <button onclick="location.href='terms.html'">Terms</button>
</div>

</body>
</html>
