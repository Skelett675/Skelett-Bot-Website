<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Start</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1e1f22, #111214);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* GLASS CARD */
.card {
  width: 500px;
  padding: 35px;
  border-radius: 25px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(88, 242, 163, 0.25);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);

  text-align: center;

  transform: perspective(1000px) rotateX(3deg);
  transition: 0.4s;
}

.card:hover {
  transform: perspective(1000px) rotateX(0deg) scale(1.02);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.7),
    0 0 25px rgba(88, 242, 163, 0.3);
}

h1 {
  color: #58f2a3;
  text-shadow: 0 0 10px rgba(88, 242, 163, 0.4);
}

button {
  margin-top: 15px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #5865F2;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>📜 Start</h1>
  <p>Willkommen im Dashboard System</p>

  <button onclick="location.href='dashboard.html'">Dashboard</button>
  <button onclick="location.href='privacy.html'">Richtlinien</button>
</div>

</body>
</html>
