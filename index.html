<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Start</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e1f22, #2b2d31);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Back Button */
.back {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
}

/* Card */
.card {
  width: 500px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  text-align: center;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #5865F2;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1>📜 Willkommen</h1>

  <p>
    Bevor du das Dashboard nutzt, musst du den Richtlinien zustimmen.
  </p>

  <p style="font-size:12px;opacity:0.7;">
    - Nur für Owner<br>
    - Keine Manipulation ohne Erlaubnis<br>
    - Nutzung auf eigene Verantwortung
  </p>

  <button onclick="location.href='dashboard.html'">
    Zustimmen & Weiter
  </button>
</div>

</body>
</html>
