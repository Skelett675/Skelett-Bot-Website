<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<button class="gear-btn" onclick="toggleSettings()">⚙</button>

<div id="settings" class="settings hidden">
  <h3>Settings</h3>

  <select onchange="setLang(this.value)">
    <option value="de">Deutsch</option>
    <option value="en">English</option>
  </select>

  <select onchange="setTheme(this.value)">
    <option value="green">Green</option>
    <option value="blue">Blue</option>
    <option value="red">Red</option>
    <option value="purple">Purple</option>
    <option value="orange">Orange</option>
    <option value="gray">Gray</option>
    <option value="white">White</option>
  </select>
</div>

<div class="center">
  <div class="card">

    <h1 data-de="Skelett Bot" data-en="Skelett Bot">Skelett Bot</h1>
    <p data-de="Control Panel" data-en="Control Panel">Control Panel</p>

    <button onclick="location.href='terms.html'" data-de="AGB" data-en="Terms">Terms</button>
    <button onclick="location.href='privacy.html'" data-de="Datenschutz" data-en="Privacy">Privacy</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
