<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Skelett Bot</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>

<body>

<div class="glow"></div>

<!-- SETTINGS BUTTON -->
<button class="settings-btn" onclick="toggleSettings()">⚙</button>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settings">

  <h3>Settings</h3>

  <label>Sprache</label>
  <select onchange="setLang(this.value)">
    <option value="de">🇩🇪 Deutsch</option>
    <option value="en">🇬🇧 English</option>
  </select>

  <label>Farbe</label>
  <select onchange="setTheme(this.value)">
    <option value="green">Grün</option>
    <option value="blue">Blau</option>
    <option value="red">Rot</option>
    <option value="purple">Lila</option>
    <option value="orange">Orange</option>
    <option value="gray">Grau</option>
    <option value="dark">Dark</option>
  </select>

</div>

<div class="container">

  <div class="card">

    <h1 id="title">🤖 Skelett Bot</h1>
    <p id="subtitle">Control Panel</p>

    <!-- DASHBOARD IST NOCH DRIN -->
    <button onclick="location.href='dashboard.html'">Dashboard</button>

    <button onclick="location.href='terms.html'">Terms</button>
    <button onclick="location.href='privacy.html'">Privacy</button>

  </div>

</div>

</body>
</html>
