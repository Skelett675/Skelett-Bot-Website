<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1e1f22, #111214);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 600px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(88,242,163,0.25);
  text-align: center;
}

h1 {
  color: #58f2a3;
}

.status {
  font-size: 22px;
  margin: 10px;
}

.online { color: #58f2a3; }
.offline { color: #ff5555; }

button {
  margin-top: 15px;
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}
button:hover {
  background: rgba(88,242,163,0.2);
}
</style>
</head>

<body>

<div class="card">

<h1>📊 Dashboard</h1>

<div id="status">Lade...</div>
<div id="automod">Lade...</div>

<button onclick="location.href='index.html'">
⬅ Start
</button>

</div>

<script>

const API = "https://wearing-requesting-tomatoes-permalink.trycloudflare.com";

async function load() {
  try {
    const res = await fetch(API + "/api/status");
    const data = await res.json();

    document.getElementById("status").innerHTML =
      data.online
        ? "<span class='online'>🟢 ONLINE</span>"
        : "<span class='offline'>🔴 OFFLINE</span>";

    document.getElementById("automod").innerHTML =
      data.autoMod
        ? "<span class='online'>🟢 AutoMod AN</span>"
        : "<span class='offline'>🔴 AutoMod AUS</span>";

  } catch (e) {
    console.log(e);
    document.getElementById("status").innerHTML =
      "❌ API FEHLER";
  }
}

load();
setInterval(load, 3000);

</script>

</body>
</html>
