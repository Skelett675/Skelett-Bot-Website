<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: #0f1115;
  color:white;
}

.card {
  margin:20px;
  padding:20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(88,242,163,0.3);
  border-radius: 15px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  background:#58f2a3;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>📊 Dashboard</h1>

<button onclick="loadServers()">Server laden</button>

<div id="servers"></div>

<script>

const API = "http://192.168.178.X:3000";

async function loadServers() {
  const res = await fetch(API + "/api/servers");
  const data = await res.json();

  document.getElementById("servers").innerHTML =
    data.map(s => `
      <div class="card">
        <b>${s.name}</b><br>
        <button onclick="invite('${s.id}')">Invite erstellen</button>
      </div>
    `).join("");
}

async function invite(id) {
  const res = await fetch(API + "/api/invite/" + id);
  const data = await res.json();
  alert(data.url);
}

</script>

</body>
</html>
