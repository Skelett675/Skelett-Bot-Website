<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1e1f22, #111214);
  color: white;
}

/* BACK */
.back {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 10px 15px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.back:hover {
  transform: scale(1.05);
  background: rgba(88, 242, 163, 0.2);
  box-shadow: 0 0 15px rgba(88, 242, 163, 0.5);
}

/* GLASS CARD */
.card {
  width: 250px;
  padding: 25px;
  border-radius: 25px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(88, 242, 163, 0.25);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);

  transform: perspective(1000px) rotateX(3deg);
  transition: 0.4s;
}

.card:hover {
  transform: perspective(1000px) rotateX(0deg) scale(1.03);
}

/* TITLE */
h1 {
  text-align: center;
  color: #58f2a3;
  text-shadow: 0 0 10px rgba(88, 242, 163, 0.4);
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 60px;
  flex-wrap: wrap;
}

/* COLORS */
.green {
  color: #58f2a3;
  text-shadow: 0 0 10px #58f2a3;
}

.red {
  color: #ff4d4d;
  text-shadow: 0 0 10px #ff4d4d;
}

button.action {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: #5865F2;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="back" onclick="location.href='index.html'">
⬅ Zurück
</button>

<h1>🤖 Dashboard</h1>

<div class="container">

  <div class="card">
    <h3>Bot Status</h3>
    <p id="status">Lade...</p>
  </div>

  <div class="card">
    <h3>AutoMod</h3>
    <p id="automod">Lade...</p>
    <button class="action" onclick="toggle()">Toggle</button>
  </div>

</div>

<script>

async function load(){
  const res = await fetch("http://localhost:3000/api/status");
  const data = await res.json();

  document.getElementById("status").innerHTML =
    data.online ? "<span class='green'>🟢 ONLINE</span>" : "<span class='red'>🔴 OFFLINE</span>";

  document.getElementById("automod").innerHTML =
    data.autoMod ? "<span class='green'>🟢 AN</span>" : "<span class='red'>🔴 AUS</span>";
}

async function toggle(){
  await fetch("http://localhost:3000/api/automod", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ value: true })
  });

  load();
}

load();
setInterval(load, 3000);

</script>

</body>
</html>
