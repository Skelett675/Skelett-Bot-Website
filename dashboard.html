<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#1e1f22,#111214);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:700px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(88,242,163,.25);

    box-shadow:
    0 10px 40px rgba(0,0,0,.6),
    inset 0 0 20px rgba(255,255,255,.05);

    text-align:center;
}

.status{
    font-size:25px;
    margin-top:20px;
}

.online{
    color:#58f2a3;
}

.offline{
    color:#ff5555;
}

.btn{
    margin-top:20px;
    padding:14px 20px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:rgba(88,242,163,.2);
    box-shadow:0 0 20px rgba(88,242,163,.4);
}
</style>
</head>

<body>

<div class="card">

<h1>📊 Dashboard</h1>

<div class="status" id="status">
Lade...
</div>

<div class="status" id="automod">
Lade...
</div>

<button class="btn"
onclick="location.href='index.html'">
⬅ Zurück zum Start
</button>

</div>

<script>

async function load(){

try{

const res =
await fetch("/api/status");

const data =
await res.json();

document.getElementById("status")
.innerHTML =
data.online
? "<span class='online'>🟢 Bot Online</span>"
: "<span class='offline'>🔴 Bot Offline</span>";

document.getElementById("automod")
.innerHTML =
data.autoMod
? "<span class='online'>🟢 AutoMod Aktiv</span>"
: "<span class='offline'>🔴 AutoMod Aus</span>";

}catch(e){

document.getElementById("status")
.innerHTML =
"API Fehler";

}

}

load();
setInterval(load,3000);

</script>

</body>
</html>
