<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: radial-gradient(circle at top, #1a1c20, #0c0d10);
  color:white;
  overflow:hidden;
}

.glow {
  position:absolute;
  width:400px;
  height:400px;
  background: rgba(88,242,163,0.25);
  filter: blur(120px);
  border-radius:50%;
  top:-100px;
  left:-100px;
}

.card {
  width:320px;
  padding:30px;
  border-radius:20px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(88,242,163,0.25);

  box-shadow: 0 10px 40px rgba(0,0,0,0.7),
              inset 0 0 20px rgba(255,255,255,0.05);

  text-align:center;
  transform: perspective(800px) rotateX(3deg);
  transition:0.4s;
}

.card:hover {
  transform: perspective(800px) rotateX(0deg) scale(1.03);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8),
              0 0 25px rgba(88,242,163,0.3);
}

h1 {
  color:#58f2a3;
  text-shadow:0 0 10px rgba(88,242,163,0.4);
}

button {
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:12px;
  background:#58f2a3;
  cursor:pointer;
  font-weight:bold;
}

button:hover {
  box-shadow:0 0 15px rgba(88,242,163,0.6);
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">
  <h1>🔐 Login</h1>
  <p>Discord Zugang erforderlich</p>

  <button onclick="login()">Mit System verbinden</button>
</div>

<script>
const API = "http://192.168.178.X:3000";

async function login() {
  await fetch(API + "/api/login", { method:"POST" });
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
